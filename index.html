<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Internet Archaeology - Find Your Forgotten Accounts</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0d1117;
  color: #c9d1d9;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  line-height: 1.6;
  min-height: 100vh;
}

.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 40px 20px;
}

header {
  text-align: center;
  margin-bottom: 40px;
}

header h1 {
  font-size: 28px;
  font-weight: 700;
  color: #f0f6fc;
  margin-bottom: 6px;
}

header p {
  color: #8b949e;
  font-size: 15px;
}

.search-box {
  display: flex;
  gap: 8px;
  margin-bottom: 32px;
}

.search-box input {
  flex: 1;
  padding: 12px 16px;
  font-size: 16px;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 6px;
  color: #f0f6fc;
  outline: none;
}

.search-box input:focus {
  border-color: #58a6ff;
  box-shadow: 0 0 0 3px rgba(56,139,253,0.15);
}

.search-box button {
  padding: 12px 24px;
  font-size: 16px;
  font-weight: 600;
  background: #238636;
  color: #fff;
  border: 1px solid rgba(240,246,252,0.1);
  border-radius: 6px;
  cursor: pointer;
}

.search-box button:hover { background: #2ea043; }
.search-box button:disabled { opacity: 0.5; cursor: not-allowed; }

/* Progress */
#progress { display: none; margin-bottom: 24px; }

.progress-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
  font-size: 14px;
  color: #8b949e;
}

.progress-bar-bg {
  height: 6px;
  background: #21262d;
  border-radius: 3px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: #58a6ff;
  border-radius: 3px;
  transition: width 0.3s ease;
  width: 0%;
}

.scanning-label {
  margin-top: 8px;
  font-size: 13px;
  color: #6e7681;
  font-style: italic;
}

/* Results */
#results { display: none; }

.summary-bar {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 6px;
  padding: 16px 20px;
  margin-bottom: 24px;
  font-size: 15px;
}

.summary-bar .found-count {
  color: #3fb950;
  font-weight: 700;
  font-size: 20px;
}

.result-card {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 6px;
  padding: 16px 20px;
  margin-bottom: 12px;
  transition: border-color 0.2s;
}

.result-card.found {
  border-left: 3px solid #3fb950;
}

.result-card.not-found {
  opacity: 0.5;
  border-left: 3px solid #30363d;
}

.result-card .card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 6px;
}

.result-card .platform-icon {
  font-size: 22px;
  width: 30px;
  text-align: center;
}

.result-card .platform-name {
  font-weight: 600;
  font-size: 16px;
  color: #f0f6fc;
  flex: 1;
}

.result-card .platform-era {
  font-size: 12px;
  color: #6e7681;
}

.result-card .badge {
  font-size: 12px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 10px;
}

.badge-found {
  background: rgba(63,185,80,0.15);
  color: #3fb950;
}

.badge-none {
  background: rgba(110,118,129,0.15);
  color: #6e7681;
}

.capture-info {
  margin: 8px 0 4px 40px;
  font-size: 14px;
  color: #8b949e;
}

.capture-info strong {
  color: #c9d1d9;
}

.snapshot-links {
  margin: 10px 0 0 40px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.snapshot-links a {
  display: inline-block;
  padding: 6px 14px;
  font-size: 13px;
  font-weight: 500;
  color: #58a6ff;
  background: rgba(56,139,253,0.1);
  border: 1px solid rgba(56,139,253,0.3);
  border-radius: 6px;
  text-decoration: none;
}

.snapshot-links a:hover {
  background: rgba(56,139,253,0.2);
  border-color: #58a6ff;
}

.not-found-section {
  margin-top: 32px;
}

.not-found-section h3 {
  font-size: 14px;
  color: #6e7681;
  font-weight: 500;
  margin-bottom: 8px;
}

.not-found-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.not-found-chip {
  font-size: 12px;
  color: #6e7681;
  background: #161b22;
  border: 1px solid #21262d;
  border-radius: 12px;
  padding: 4px 10px;
}

/* API warning */
.api-warning {
  background: rgba(210,153,34,0.1);
  border: 1px solid rgba(210,153,34,0.3);
  border-radius: 6px;
  padding: 12px 16px;
  margin-bottom: 24px;
  font-size: 13px;
  color: #d2992a;
}

.api-warning a { color: #e3b341; }

footer {
  text-align: center;
  margin-top: 48px;
  padding-top: 24px;
  border-top: 1px solid #21262d;
  font-size: 12px;
  color: #484f58;
}

footer a { color: #58a6ff; text-decoration: none; }

@media (max-width: 500px) {
  .search-box { flex-direction: column; }
  .search-box button { width: 100%; }
  .container { padding: 24px 16px; }
  header h1 { font-size: 22px; }
}
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Internet Archaeology</h1>
    <p>Search the Wayback Machine for your old accounts across 20+ platforms</p>
  </header>

  <div id="api-warning" class="api-warning" style="display:none">
    Running in lite mode (limited results). For full search, <a href="https://github.com/ashleywolf/internet-archaeology#deploy-to-vercel" target="_blank">deploy to Vercel</a>.
  </div>

  <div class="search-box">
    <input type="text" id="username" placeholder="Enter a username..." autocomplete="off" autofocus>
    <button id="dig-btn" onclick="startDig()">Search</button>
  </div>

  <div id="progress">
    <div class="progress-header">
      <span id="progress-label">Searching...</span>
      <span id="progress-count">0 / 0</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
    <div class="scanning-label" id="scanning-label"></div>
  </div>

  <div id="results"></div>

  <footer>
    <a href="https://github.com/ashleywolf/internet-archaeology" target="_blank">Source on GitHub</a> | v10
  </footer>
</div>

<script>
(function() {
  // ---- Platform definitions ----
  var PLATFORMS = [
    { name: 'MySpace', icon: '🎵', era: '2003-2009',
      urls: ['myspace.com/{u}'] },
    { name: 'LiveJournal', icon: '📓', era: '1999-2012',
      urls: ['{u}.livejournal.com', 'livejournal.com/users/{u}', 'users.livejournal.com/{u}'] },
    { name: 'Xanga', icon: '📝', era: '2000-2009',
      urls: ['xanga.com/{u}'] },
    { name: 'Friendster', icon: '🤝', era: '2002-2011',
      urls: ['friendster.com/{u}'] },
    { name: 'GeoCities', icon: '🌐', era: '1994-2009',
      urls: ['geocities.com/{u}'] },
    { name: 'Angelfire', icon: '🔥', era: '1996-2014',
      urls: ['angelfire.com/{u}'] },
    { name: 'Tripod', icon: '🏗', era: '1995-2009',
      urls: ['{u}.tripod.com'] },
    { name: 'DeviantArt', icon: '🎨', era: '2000-now',
      urls: ['{u}.deviantart.com', 'deviantart.com/{u}'] },
    { name: 'Photobucket', icon: '📸', era: '2003-now',
      urls: ['photobucket.com/user/{u}'] },
    { name: 'hi5', icon: '🖐', era: '2003-2017',
      urls: ['hi5.com/{u}'] },
    { name: 'Bebo', icon: '💬', era: '2005-2013',
      urls: ['bebo.com/{u}'] },
    { name: 'Neopets', icon: '🐾', era: '1999-now',
      urls: ['neopets.com/userlookup.phtml?user={u}', 'neopets.com/~{u}'] },
    { name: 'Last.fm', icon: '🎧', era: '2002-now',
      urls: ['last.fm/user/{u}', 'lastfm.com/user/{u}'] },
    { name: 'Flickr', icon: '📷', era: '2004-now',
      urls: ['flickr.com/photos/{u}'] },
    { name: 'Tumblr', icon: '📱', era: '2007-now',
      urls: ['{u}.tumblr.com'] },
    { name: 'Twitter', icon: '🐦', era: '2006-now',
      urls: ['twitter.com/{u}'] },
    { name: 'Digg', icon: '📰', era: '2004-2012',
      urls: ['digg.com/users/{u}'] },
    { name: 'Delicious', icon: '🔖', era: '2003-2017',
      urls: ['del.icio.us/{u}', 'delicious.com/{u}'] },
    { name: 'StumbleUpon', icon: '🎲', era: '2001-2018',
      urls: ['stumbleupon.com/stumbler/{u}'] },
    { name: 'Google+', icon: '🔴', era: '2011-2019',
      urls: ['plus.google.com/+{u}'] },
    { name: 'Vine', icon: '🌿', era: '2013-2017',
      urls: ['vine.co/{u}'] },
    { name: 'AOL Hometown', icon: '📡', era: '1996-2008',
      urls: ['hometown.aol.com/{u}', 'members.aol.com/{u}'] },
    { name: 'Orkut', icon: '🟣', era: '2004-2014',
      urls: ['orkut.com/Profile?uid={u}'] },
    { name: 'Blogger', icon: '🅱', era: '1999-now',
      urls: ['{u}.blogspot.com'] }
  ];

  var apiMode = 'unknown'; // 'full', 'lite', or 'unknown'
  var isSearching = false;

  // ---- Detect API mode ----
  function detectApi() {
    return fetch('/api/search?url=example.com')
      .then(function(r) { return r.ok || r.status === 400; })
      .then(function(available) {
        apiMode = available ? 'full' : 'lite';
        return apiMode;
      })
      .catch(function() {
        apiMode = 'lite';
        return apiMode;
      });
  }

  // ---- Search functions ----

  // Full mode: call our API proxy -> CDX API
  function searchUrlFull(url) {
    return fetch('/api/search?url=' + encodeURIComponent(url))
      .then(function(r) { return r.json(); })
      .catch(function() { return { captures: 0 }; });
  }

  // Lite mode: call Wayback Availability API directly (has CORS, but unreliable)
  function searchUrlLite(url) {
    return fetch('https://archive.org/wayback/available?url=' + url + '&timestamp=20050101')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data && data.archived_snapshots && data.archived_snapshots.closest) {
          var snap = data.archived_snapshots.closest;
          return {
            captures: 1,
            first: snap.timestamp,
            last: snap.timestamp,
            samples: [{ ts: snap.timestamp, url: snap.url, wayback: snap.url }]
          };
        }
        return { captures: 0 };
      })
      .catch(function() { return { captures: 0 }; });
  }

  function searchUrl(url) {
    if (apiMode === 'full') return searchUrlFull(url);
    return searchUrlLite(url);
  }

  // ---- Build search queue ----
  function buildSearchQueue(username) {
    var queue = [];
    for (var i = 0; i < PLATFORMS.length; i++) {
      var p = PLATFORMS[i];
      for (var j = 0; j < p.urls.length; j++) {
        var url = p.urls[j].replace(/\{u\}/g, username);
        queue.push({ platform: p, url: url });
      }
    }
    return queue;
  }

  // ---- Main search ----
  function startDig() {
    if (isSearching) return;

    var username = document.getElementById('username').value.trim();
    if (!username) {
      document.getElementById('username').focus();
      return;
    }

    isSearching = true;
    document.getElementById('dig-btn').disabled = true;

    var queue = buildSearchQueue(username);
    var total = queue.length;
    var completed = 0;
    var platformResults = {}; // platform name -> best result
    var foundPlatforms = [];
    var notFoundPlatforms = [];

    // Show progress
    var progressEl = document.getElementById('progress');
    var resultsEl = document.getElementById('results');
    progressEl.style.display = 'block';
    resultsEl.style.display = 'block';
    resultsEl.innerHTML = '';
    updateProgress(0, total, '');

    // Concurrent search with pool
    var concurrency = (apiMode === 'full') ? 4 : 2;
    var idx = 0;
    var active = 0;

    function next() {
      while (active < concurrency && idx < queue.length) {
        var item = queue[idx];
        idx++;
        active++;
        (function(searchItem) {
          searchUrl(searchItem.url).then(function(result) {
            active--;
            completed++;
            updateProgress(completed, total, searchItem.platform.name);

            if (result && result.captures > 0) {
              var name = searchItem.platform.name;
              var existing = platformResults[name];
              if (!existing || result.captures > existing.captures) {
                platformResults[name] = {
                  platform: searchItem.platform,
                  url: searchItem.url,
                  captures: result.captures,
                  first: result.first,
                  last: result.last,
                  samples: result.samples || []
                };
              }
            }

            if (completed === total) {
              finishSearch(platformResults);
            } else {
              next();
            }
          });
        })(item);
      }
    }

    next();
  }

  function updateProgress(done, total, currentPlatform) {
    var pct = total > 0 ? Math.round((done / total) * 100) : 0;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-count').textContent = done + ' / ' + total;
    document.getElementById('progress-label').textContent = done < total ? 'Searching...' : 'Done';
    if (currentPlatform) {
      document.getElementById('scanning-label').textContent = 'Checking ' + currentPlatform + '...';
    }
  }

  function finishSearch(platformResults) {
    isSearching = false;
    document.getElementById('dig-btn').disabled = false;
    document.getElementById('scanning-label').textContent = '';

    var found = [];
    var notFound = [];

    for (var i = 0; i < PLATFORMS.length; i++) {
      var p = PLATFORMS[i];
      if (platformResults[p.name]) {
        found.push(platformResults[p.name]);
      } else {
        notFound.push(p);
      }
    }

    // Sort found by capture count (most captures first)
    found.sort(function(a, b) { return b.captures - a.captures; });

    renderResults(found, notFound);
  }

  // ---- Rendering ----

  function formatTs(ts) {
    if (!ts || ts.length < 8) return '';
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var y = ts.substring(0, 4);
    var m = parseInt(ts.substring(4, 6), 10);
    var d = parseInt(ts.substring(6, 8), 10);
    return months[m - 1] + ' ' + d + ', ' + y;
  }

  function yearFromTs(ts) {
    if (!ts || ts.length < 4) return '?';
    return ts.substring(0, 4);
  }

  function renderResults(found, notFound) {
    var html = '';

    // Summary
    html += '<div class="summary-bar">';
    if (found.length > 0) {
      html += '<span class="found-count">' + found.length + '</span>';
      html += ' platform' + (found.length === 1 ? '' : 's') + ' with archived captures found';
      html += ' <span style="color:#6e7681">(out of ' + PLATFORMS.length + ' searched)</span>';
    } else {
      html += 'No archived captures found across ' + PLATFORMS.length + ' platforms. ';
      html += 'This username may not have been captured by the Wayback Machine, ';
      html += 'or may have used different names on different sites.';
    }
    html += '</div>';

    // Found cards
    for (var i = 0; i < found.length; i++) {
      var r = found[i];
      html += '<div class="result-card found">';
      html += '<div class="card-header">';
      html += '<span class="platform-icon">' + r.platform.icon + '</span>';
      html += '<span class="platform-name">' + r.platform.name + '</span>';
      html += '<span class="platform-era">' + r.platform.era + '</span>';
      html += '<span class="badge badge-found">' + r.captures + ' capture' + (r.captures === 1 ? '' : 's') + '</span>';
      html += '</div>';

      // Capture date range
      html += '<div class="capture-info">';
      if (r.first && r.last && r.first !== r.last) {
        html += 'Archived from <strong>' + formatTs(r.first) + '</strong>';
        html += ' to <strong>' + formatTs(r.last) + '</strong>';
      } else if (r.first) {
        html += 'Captured on <strong>' + formatTs(r.first) + '</strong>';
      }
      html += '</div>';

      // Snapshot links
      if (r.samples && r.samples.length > 0) {
        html += '<div class="snapshot-links">';
        if (r.samples.length >= 2) {
          html += '<a href="' + r.samples[0].wayback + '" target="_blank" rel="noopener">Earliest snapshot (' + yearFromTs(r.samples[0].ts) + ')</a>';
          html += '<a href="' + r.samples[r.samples.length - 1].wayback + '" target="_blank" rel="noopener">Latest snapshot (' + yearFromTs(r.samples[r.samples.length - 1].ts) + ')</a>';
        } else {
          html += '<a href="' + r.samples[0].wayback + '" target="_blank" rel="noopener">View snapshot</a>';
        }
        // All captures link
        html += '<a href="https://web.archive.org/web/*/' + r.url + '" target="_blank" rel="noopener">All captures</a>';
        html += '</div>';
      }

      html += '</div>';
    }

    // Not found — compact list
    if (notFound.length > 0) {
      html += '<div class="not-found-section">';
      html += '<h3>No captures found on ' + notFound.length + ' other platforms:</h3>';
      html += '<div class="not-found-list">';
      for (var j = 0; j < notFound.length; j++) {
        html += '<span class="not-found-chip">' + notFound[j].icon + ' ' + notFound[j].name + '</span>';
      }
      html += '</div>';
      html += '</div>';
    }

    document.getElementById('results').innerHTML = html;
  }

  // ---- Init ----
  document.getElementById('username').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.keyCode === 13) startDig();
  });

  // Detect API availability
  detectApi().then(function(mode) {
    if (mode === 'lite') {
      document.getElementById('api-warning').style.display = 'block';
    }
  });

  // Expose startDig globally for the button onclick
  window.startDig = startDig;
})();
</script>

</body>
</html>
